# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "ee0d8eb337181cafaf7912854e760d1d"
name = "Custlo shubham"
application_url = "https://shopify.dev/apps/default-app-home"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  uri = "/api/webhooks/customers_data_request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "/api/webhooks/customers_redact"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "/api/webhooks/shop_redact"
  compliance_topics = [ "shop/redact" ]

[access.admin]
direct_api_mode = "online"
embedded_app_direct_api_access = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_all_orders,read_customer_events,read_customers,read_fulfillments,read_inventory,read_locales,read_orders,read_reports,write_checkout_branding_settings,write_content,write_delivery_customizations,write_discounts,write_files,write_metaobject_definitions,write_metaobjects,write_orders,write_payment_customizations,write_pixels,write_products,write_themes,write_validations"

[auth]
redirect_urls = [
  "https://shopify.dev/apps/default-app-home/auth/callback"
]


[metaobjects.app.faq]
name = "FAQ"

[metaobjects.app.faq.fields.question]
name = "Question"
type = "single_line_text_field"
required = true

[metaobjects.app.faq.fields.answer]
name = "Answer"
type = "multi_line_text_field"
required = true

[metaobjects.app.faq.fields.show_on_faq_page]
name = "Show on FAQ page"
type = "boolean"

[product.metafields.app.faq]
name = "FAQ"
description = "FAQ for this product"
type = "metaobject_reference<$app:faq>"

  [product.metafields.app.faq.access]
  admin = "merchant_read_write"

[sidekick]
extensions_summary = "Read FAQ entries stored in the app"

[pos]
embedded = false
